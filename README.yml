module_name: "Terraform Cognito Module"
module_description: |
  Provisions Amazon Cognito user pools with optional Lambda triggers, identity providers, app clients, and hosted UI domains.
  Simplifies multi-pool configuration through a single parameter map with shared defaults.
module_badges:
  - url: "https://github.com/gocloudLa/terraform-aws-wrapper-cognito/releases/latest"
    image: "https://img.shields.io/github/v/release/gocloudLa/terraform-aws-wrapper-cognito.svg?style=for-the-badge"
    alt: "Latest Release"
  - url: ""
    image: "https://img.shields.io/github/last-commit/gocloudLa/terraform-aws-wrapper-cognito.svg?style=for-the-badge"
    alt: "Last Commit"
  - url: "https://registry.terraform.io/modules/gocloudLa/wrapper-cognito/aws"
    image: "https://img.shields.io/badge/Terraform-Registry-7B42BC?style=for-the-badge&logo=terraform&logoColor=white"
    alt: "Terraform Registry"
quick_start: |
  ```hcl
  cognito_parameters = {
    "client-employee" = {
      deletion_protection = "INACTIVE"
      admin_create_user_config = {
        allow_admin_create_user_only = "true"
      }
      alias_attributes = ["email", "preferred_username"]

      string_schemas = [
        {
          name                     = "user_type"
          attribute_data_type      = "String"
          developer_only_attribute = false
          mutable                  = true
          required                 = false
          string_attribute_constraints = {
            max_length = 128
          }
        }
      ]

      identity_providers = [
        {
          provider_name = "ActiveDirectory"
          provider_type = "SAML"
          provider_details = {
            MetadataURL = "https://client.domain.com/federationmetadata/2007-06/federationmetadata.xml"
          }
          attribute_mapping = {
            email = "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress"
            name  = "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/givenname"
          }
        }
      ]

      clients = [
        {
          name                    = "client-employee"
          enable_token_revocation = "true"
          allowed_oauth_scopes    = ["email", "openid", "profile"]
          explicit_auth_flows = [
            "ALLOW_REFRESH_TOKEN_AUTH",
            "ALLOW_USER_SRP_AUTH",
            "ALLOW_USER_PASSWORD_AUTH"
          ]
          supported_identity_providers         = ["ActiveDirectory"]
          allowed_oauth_flows_user_pool_client = true
          allowed_oauth_flows                  = ["code"]
          callback_urls = [
            "https://localhost:3000",
            "http://localhost:5173/api/auth/callback/cognito"
          ]
        }
      ]

      domain = "client-employee"
    }

    "client-members" = {
      deletion_protection = "INACTIVE"
      admin_create_user_config = {
        allow_admin_create_user_only = "true"
      }
      alias_attributes = ["email", "preferred_username"]

      clients = [
        {
          name                    = "client-members"
          enable_token_revocation = "true"
          allowed_oauth_scopes    = ["email", "openid", "profile"]
          explicit_auth_flows = [
            "ALLOW_REFRESH_TOKEN_AUTH",
            "ALLOW_USER_SRP_AUTH",
            "ALLOW_USER_PASSWORD_AUTH"
          ]
          supported_identity_providers         = ["COGNITO"]
          allowed_oauth_flows_user_pool_client = true
          allowed_oauth_flows                  = ["code"]
          callback_urls                        = ["https://mydomain.com/callback"]
        }
      ]

      lambda_config = {
        post_confirmation = "migrate-user"
      }

      domain = "client-members"

      lambdas = {
        "migrate-user" = {
          runtime    = "provided.al2"
          handler    = "member-migrate-user"
          attach_vpc = true
        }
      }
    }
  }
  ```
features:
  - icon: "🔐"
    title: "User Pool"
    short_description: "Creates Cognito user pools with schemas, MFA, and password policies."
    long_description: |
      Each entry in `cognito_parameters` provisions an `aws_cognito_user_pool` with optional custom attributes, MFA settings, and deletion protection.
      Pool names follow the platform naming convention using `local.common_name` and the map key.
    examples:
      - title: "User pool with custom attributes"
        code: |
          ```hcl
          cognito_parameters = {
            "client-employee" = {
              deletion_protection = "INACTIVE"
              alias_attributes    = ["email", "preferred_username"]
              string_schemas = [
                {
                  name                     = "user_type"
                  attribute_data_type      = "String"
                  developer_only_attribute = false
                  mutable                  = true
                  required                 = false
                  string_attribute_constraints = {
                    max_length = 128
                  }
                }
              ]
            }
          }
          ```
  - icon: "🌐"
    title: "Identity Providers and App Clients"
    short_description: "Configures SAML/OIDC providers, OAuth clients, and hosted UI domains."
    long_description: |
      Supports `identity_providers` for federated sign-in, `clients` for OAuth/OIDC app configuration, and `domain` for the Cognito hosted UI endpoint.
    examples:
      - title: "SAML identity provider with OAuth client"
        code: |
          ```hcl
          cognito_parameters = {
            "client-employee" = {
              identity_providers = [
                {
                  provider_name = "ActiveDirectory"
                  provider_type = "SAML"
                  provider_details = {
                    MetadataURL = "https://client.domain.com/federationmetadata/2007-06/federationmetadata.xml"
                  }
                  attribute_mapping = {
                    email = "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress"
                  }
                }
              ]
              clients = [
                {
                  name                                 = "client-employee"
                  supported_identity_providers         = ["ActiveDirectory"]
                  allowed_oauth_flows_user_pool_client = true
                  allowed_oauth_flows                  = ["code"]
                  callback_urls                        = ["https://mydomain.com/callback"]
                }
              ]
              domain = "client-employee"
            }
          }
          ```
  - icon: "🎨"
    title: "Hosted UI Domain and Branding"
    short_description: "Custom domains with ACM certificates and hosted UI CSS/logo customization."
    long_description: |
      Set `domain_certificate_arn` for a custom domain (ACM certificate in us-east-1).
      Pool-level branding uses `ui_customization_css` and `ui_customization_image_file` on each `cognito_parameters` entry.
      Optional per-app-client overrides use the same keys inside a `clients` entry when different branding is required.
      UI customization requires an `aws_cognito_user_pool_domain` for the pool.
    examples:
      - title: "Custom domain with pool-level UI branding"
        code: |
          ```hcl
          cognito_parameters = {
            "client-employee" = {
              domain                 = "auth.mydomain.com"
              domain_certificate_arn = "arn:aws:acm:us-east-1:123456789012:certificate/resource-01xxxxxxxxxxxxx"
              ui_customization_css        = ".banner-customizable { background-color: #003366; }"
              ui_customization_image_file = filebase64("logo.png")
            }
          }
          ```
      - title: "Per-client UI branding override"
        code: |
          ```hcl
          cognito_parameters = {
            "client-employee" = {
              domain = "client-employee"
              clients = [
                {
                  name                        = "client-employee"
                  callback_urls               = ["https://mydomain.com/callback"]
                  ui_customization_css        = ".label-customizable { color: #003366; }"
                  ui_customization_image_file = filebase64("client-logo.png")
                }
              ]
            }
          }
          ```
  - icon: "λ"
    title: "Lambda Triggers"
    short_description: "Deploys trigger Lambdas and wires them to the user pool."
    long_description: |
      Define trigger functions under `lambdas` and reference them from `lambda_config` by name.
      The wrapper creates `aws_lambda_permission` resources so Cognito can invoke each function.
      Lambda IAM policies that reference the user pool ARN are applied in a second pass to avoid circular dependencies between `aws_cognito_user_pool` and `aws_lambda_function`.
    examples:
      - title: "Post-confirmation trigger with VPC access"
        code: |
          ```hcl
          cognito_parameters = {
            "client-members" = {
              lambda_config = {
                post_confirmation = "migrate-user"
              }
              lambdas = {
                "migrate-user" = {
                  runtime    = "provided.al2"
                  handler    = "member-migrate-user"
                  attach_vpc = true
                }
              }
            }
          }
          ```
      - title: "Lambda policy statements scoped to the user pool"
        code: |
          ```hcl
          cognito_parameters = {
            "client-employee" = {
              lambda_config = {
                post_confirmation = "post-confirmation"
              }
              lambdas = {
                "post-confirmation" = {
                  runtime = "provided.al2"
                  handler = "employee-post-confirmation"
                  cognito_policy_statements = {
                    AdminUpdateUserAttributes = {
                      effect  = "Allow"
                      actions = ["cognito-idp:AdminUpdateUserAttributes"]
                    }
                  }
                }
              }
            }
          }
          ```
important_notes: |
  - **⚠️ Lambda ordering:** User pool Lambda triggers and IAM policies that reference the pool ARN are created in separate apply steps to break the Cognito–Lambda dependency cycle. Expect a two-phase apply when adding or changing triggers.
  - **ℹ️ User pool tier:** `ESSENTIALS` and `LITE` cannot use Threat Protection (`user_pool_add_ons.advanced_security_mode` ENFORCED/AUDIT). Use `PLUS` for advanced security, password history, and threat protection features. Omit `user_pool_tier` to keep the AWS default on new pools.
  - **ℹ️ Provider version:** Requires AWS provider `>= 5.98.0` for `user_pool_tier` and client `refresh_token_rotation`.
  - **ℹ️ Refresh token rotation:** When `clients[].refresh_token_rotation.feature` is `ENABLED`, do not set `ALLOW_REFRESH_TOKEN_AUTH` in `explicit_auth_flows` (AWS rejects it). Use the OAuth `/oauth2/token` endpoint or `GetTokensFromRefreshToken` to refresh tokens instead.
  - **ℹ️ Lambda names:** Values in `lambda_config` must match keys under `lambdas` for the same pool entry (e.g. `post_confirmation = "migrate-user"` references `lambdas.migrate-user`).
  - **ℹ️ Lambda VPC:** Set `attach_vpc = true` under `lambdas` to resolve VPC, subnets, and security group from platform defaults. Override with `vpc_name`, `subnet_name`, `security_group`, or explicit `vpc_subnet_ids` / `vpc_security_group_ids`.
  - **ℹ️ Custom domain:** `domain_certificate_arn` must reference an ISSUED ACM certificate in `us-east-1`, even when the user pool is in another region.
  - **ℹ️ UI customization:** Hosted UI branding is applied after the user pool domain exists; set `domain` (or `domain` + `domain_certificate_arn`) before expecting CSS or logo changes.
  - **ℹ️ Username attributes:** `username_attributes` and `alias_attributes` are mutually exclusive in Cognito; set only one per pool.
  - **🔒 Client secrets:** App client secrets are sensitive outputs from the child module; consume them via Terraform state or a secrets manager, not plain outputs in CI logs.
input_table: |
  | enabled | Whether to create resources for this user pool entry. | `bool` | `true` | no |
  | alias_attributes | Attributes supported as aliases (e.g. email, phone_number). | `list` | `["email", "phone_number"]` | no |
  | username_attributes | Attributes that may be used as usernames (conflicts with `alias_attributes`). | `list` | `null` | no |
  | username_configuration | Username case sensitivity settings. | `map` | `{}` | no |
  | auto_verified_attributes | Attributes automatically verified on sign-up. | `list` | `["email"]` | no |
  | email_verification_message | Email verification message template for the user pool. | `string` | `null` | no |
  | email_verification_subject | Email verification subject for the user pool. | `string` | `null` | no |
  | sms_authentication_message | SMS message template for authentication. | `string` | `"Your username is {username} and temporary password is {####}."` | no |
  | sms_verification_message | SMS message template for verification. | `string` | `"This is the verification message {####}."` | no |
  | sms_configuration | SNS configuration for SMS MFA and messaging (`external_id`, `sns_caller_arn`, `sns_region`). | `map` | `{}` | no |
  | deletion_protection | Deletion protection status (`ACTIVE` or `INACTIVE`). | `string` | `"ACTIVE"` | no |
  | user_pool_tier | User pool feature plan (`LITE`, `ESSENTIALS`, or `PLUS`). | `string` | `null` | no |
  | mfa_configuration | MFA enforcement level (`OFF`, `ON`, or `OPTIONAL`). | `string` | `"OPTIONAL"` | no |
  | email_mfa_configuration | Email MFA / OTP settings (`message`, `subject`). | `map` | `{}` | no |
  | software_token_mfa_configuration | Software token MFA settings. | `map` | `{ enabled = true }` | no |
  | admin_create_user_config | Admin-driven user creation settings. | `map` | `{}` | no |
  | device_configuration | Device tracking and challenge settings. | `map` | `{}` | no |
  | email_configuration | SES email sending configuration. | `map` | `{}` | no |
  | sign_in_policy | Sign-in first-factor policy (`allowed_first_auth_factors`). | `map` | `{}` | no |
  | web_authn_configuration | WebAuthn passkey settings (`relying_party_id`, `user_verification`). | `map` | `{}` | no |
  | user_attribute_update_settings | Attributes requiring verification before update. | `map` | `null` | no |
  | recovery_mechanisms | Account recovery mechanism list (`name`, `priority`). | `list` | `[]` | no |
  | lambda_config | Map of trigger names to `lambdas` keys; V2 senders as `{ lambda_arn, lambda_version }` objects. | `map` | `null` | no |
  | password_policy | Password rules; optional `password_history_size` (requires advanced security). | `map` | `null` | no |
  | user_pool_add_ons | Advanced security add-ons; optional `advanced_security_additional_flows.custom_auth_mode`. | `map` | `{ advanced_security_mode = "ENFORCED" }` | no |
  | verification_message_template | Verification templates (`default_email_option`, `email_message`, `email_subject`, `sms_message`, link variants). | `map` | `{ default_email_option = "CONFIRM_WITH_CODE" }` | no |
  | schemas | Combined custom attribute schemas. | `list` | `[]` | no |
  | string_schemas | String-type custom attribute schemas. | `list` | `[]` | no |
  | number_schemas | Number-type custom attribute schemas. | `list` | `[]` | no |
  | domain | Hosted UI domain prefix or custom domain name for the user pool. | `string` | `null` | no |
  | domain_certificate_arn | ACM certificate ARN in us-east-1 for a custom domain. | `string` | `null` | no |
  | ui_customization_css | CSS applied to the hosted UI at pool level (domain default). | `string` | `null` | no |
  | ui_customization_image_file | Base64-encoded logo for the hosted UI at pool level. | `string` | `null` | no |
  | clients | App client definitions; optional `refresh_token_rotation` (`feature`, `retry_grace_period_seconds`). | `list` | `[]` | no |
  | user_groups | Cognito user group definitions. | `list` | `[]` | no |
  | resource_servers | Resource server and OAuth scope definitions. | `list` | `[]` | no |
  | identity_providers | SAML/OIDC/social identity provider definitions. | `list` | `[]` | no |
  | lambdas | Lambda definitions (`attach_vpc`, `source_path`, `runtime`, `cognito_policy_statements`, etc.). | `map` | `null` | no |
  | tags | Additional tags merged with platform common tags. | `map` | `null` | no |
